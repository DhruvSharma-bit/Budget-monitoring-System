services:
  postgres:
    image: postgres:16-alpine
    container_name: budget-monitor-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: budget_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d budget_system"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
